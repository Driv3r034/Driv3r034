<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <linearGradient id="asciiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#06B6D4;#10B981;#2563EB" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4;#10B981;#2563EB;#06B6D4" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.15"/>
    </linearGradient>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowEmerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="12%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.02"/></feComponentTransfer>
    </filter>

    <clipPath id="cardClip"><rect x="0" y="0" width="1180" height="610" rx="26"/></clipPath>
    <clipPath id="asciiClip"><rect x="40" y="120" width="360" height="400" rx="14"/></clipPath>

    <mask id="asciiReveal">
      <rect x="0" y="0" width="448" height="120" fill="#fff">
        <animate attributeName="height" values="120;120;520" keyTimes="0;0.12;1" dur="3.2s" fill="freeze"/>
      </rect>
    </mask>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1180" height="610" fill="#FFFFFF"/>

    <g filter="url(#bigBlur)">
      <circle r="150" fill="url(#glowBlue)">
        <animate attributeName="cx" values="180;320;180" dur="14s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="200;420;200" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle r="170" fill="url(#glowCyan)">
        <animate attributeName="cx" values="900;720;900" dur="18s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="180;460;180" dur="18s" repeatCount="indefinite"/>
      </circle>
      <circle r="140" fill="url(#glowEmerald)">
        <animate attributeName="cx" values="600;760;600" dur="16s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="520;300;520" dur="16s" repeatCount="indefinite"/>
      </circle>
    </g>

    <rect width="1180" height="610" filter="url(#noise)" opacity="0.3"/>

    <g fill="#2563EB">
      <circle cx="120" cy="90"  r="1.6" opacity="0.4"><animate attributeName="cy" values="90;70;90" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="640" cy="130" r="1.4" opacity="0.3"><animate attributeName="cy" values="130;110;130" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.05;0.4;0.05" dur="7s" repeatCount="indefinite"/></circle>
      <circle cx="980" cy="500" r="1.8" opacity="0.3"><animate attributeName="cy" values="500;480;500" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.1;0.4;0.1" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="420" cy="540" r="1.3" opacity="0.2"><animate attributeName="cy" values="540;520;540" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.05;0.3;0.05" dur="9s" repeatCount="indefinite"/></circle>
      <circle cx="1080" cy="150" r="1.5" opacity="0.3"><animate attributeName="cy" values="150;134;150" dur="6.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.08;0.4;0.08" dur="6.5s" repeatCount="indefinite"/></circle>
    </g>

    <rect width="1180" height="610" fill="url(#glassReflect)"/>

    <!-- LEFT: CODE ART PANEL -->
    <g>
      <rect x="40" y="70" width="360" height="470" rx="18" fill="#F8FAFC" fill-opacity="0.8" stroke="rgba(15,23,42,0.08)"/>
      <rect x="40" y="70" width="360" height="46" rx="18" fill="#F8FAFC" fill-opacity="0.9"/>
      <circle cx="66" cy="93" r="5" fill="#ef4444"/><circle cx="86" cy="93" r="5" fill="#eab308"/><circle cx="106" cy="93" r="5" fill="#22c55e"/>
      <text x="200" y="97" fill="#475569" font-size="12" text-anchor="middle" letter-spacing="1">~/sergey.dev</text>

      <g clip-path="url(#asciiClip)">
        <g fill="url(#asciiGrad)" font-size="12.5" filter="url(#softGlow)" letter-spacing="0.5">
          <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="6s" repeatCount="indefinite"/>
          <g mask="url(#asciiReveal)">
            <text x="66" y="150">        _____________</text>
            <text x="66" y="167">       /  C O D E   \\</text>
            <text x="66" y="184">      | .-----------. |</text>
            <text x="66" y="201">      | | { JS }    | |</text>
            <text x="66" y="218">      | | [ TS ]    | |</text>
            <text x="66" y="235">      | | (React)   | |</text>
            <text x="66" y="252">      | | =&gt; Next  | |</text>
            <text x="66" y="269">      | '-----------' |</text>
            <text x="66" y="286">       \\_____________/</text>
            <text x="66" y="303">        || || || ||</text>
            <text x="66" y="320">     .---o--o--o--o---.</text>
            <text x="66" y="337">    ( o )  D E V  ( o )</text>
            <text x="66" y="354">     '--o--o--o--o--'</text>
            <text x="66" y="371">      /  |  \\  /  |  \\</text>
            <text x="66" y="388">    (o)-(o)-(o)-(o)-(o)</text>
            <text x="66" y="405">      \\  |  /  \\  |  /</text>
            <text x="66" y="422">       (o)--(o)--(o)</text>
            <text x="66" y="439">          \\  |  /</text>
            <text x="66" y="456">         [ FRONTEND ]</text>
            <text x="66" y="473">         &lt;SERGEY/&gt;</text>
          </g>
        </g>
        <g fill="#10B981">
          <circle cx="120" cy="367" r="2.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="200" cy="367" r="2.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="0.4s" repeatCount="indefinite"/></circle>
          <circle cx="280" cy="367" r="2.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="0.8s" repeatCount="indefinite"/></circle>
        </g>
        <rect x="40" y="120" width="360" height="26" fill="#2563EB" opacity="0.06">
          <animate attributeName="y" values="120;480;120" dur="4s" repeatCount="indefinite"/>
        </rect>
        <rect x="240" y="463" width="9" height="13" fill="#2563EB">
          <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <!-- RIGHT: TERMINAL -->
    <g>
      <rect x="470" y="70" width="672" height="470" rx="18" fill="#F8FAFC" fill-opacity="0.85" stroke="rgba(15,23,42,0.08)"/>
      <rect x="470" y="70" width="672" height="46" rx="18" fill="#F8FAFC" fill-opacity="0.9"/>
      <circle cx="496" cy="93" r="5" fill="#ef4444"/><circle cx="516" cy="93" r="5" fill="#eab308"/><circle cx="536" cy="93" r="5" fill="#22c55e"/>
      <text x="806" y="97" fill="#475569" font-size="12" text-anchor="middle" letter-spacing="1">sergey — zsh</text>

      <text x="504" y="158" fill="#0F172A" font-size="26" font-weight="700">Hi <tspan font-size="24">👋</tspan> I'm <tspan fill="url(#accent)">Sergei</tspan></text>

      <g font-size="17">
        <text x="504" y="192" fill="#475569">$ role:</text>
        <g>
          <text x="566" y="192" fill="#2563EB">
            <tspan>Frontend Developer</tspan>
            <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.9;1" dur="2.6s" begin="0s;15.6s" fill="freeze"/>
          </text>
          <text x="566" y="192" fill="#06B6D4" opacity="0">
            <tspan>React &amp; Next.js Specialist</tspan>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.9;1" dur="2.6s" begin="2.6s;18.2s" fill="freeze"/>
          </text>
          <text x="566" y="192" fill="#10B981" opacity="0">
            <tspan>TypeScript Enthusiast</tspan>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.9;1" dur="2.6s" begin="5.2s;20.8s" fill="freeze"/>
          </text>
          <text x="566" y="192" fill="#2563EB" opacity="0">
            <tspan>Microfrontends</tspan>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.9;1" dur="2.6s" begin="7.8s;23.4s" fill="freeze"/>
          </text>
          <text x="566" y="192" fill="#06B6D4" opacity="0">
            <tspan>UI Engineer</tspan>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.9;1" dur="2.6s" begin="10.4s;26s" fill="freeze"/>
          </text>
          <text x="566" y="192" fill="#10B981" opacity="0">
            <tspan>Code &amp; Sports Lover</tspan>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.9;1" dur="2.6s" begin="13s;28.6s" fill="freeze"/>
          </text>
        </g>
      </g>
      <rect x="566" y="180" width="8" height="15" fill="#2563EB">
        <animate attributeName="opacity" values="1;0" dur="0.8s" repeatCount="indefinite"/>
      </rect>

      <g font-size="14" fill="#475569">
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.6s" fill="freeze"/>
          <text x="504" y="230"><tspan fill="#2563EB">📍 Location</tspan>   <tspan fill="#0F172A">Russia</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.9s" fill="freeze"/>
          <text x="504" y="256"><tspan fill="#06B6D4">🎯 Focus</tspan>      <tspan fill="#0F172A">React Ecosystem &amp; Modern Frontend</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
          <text x="504" y="282"><tspan fill="#10B981">💪 Passion</tspan>     <tspan fill="#0F172A">Programming &amp; Sports</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.5s" fill="freeze"/>
          <text x="504" y="308"><tspan fill="#2563EB">🌐 GitHub</tspan>    <tspan fill="#0F172A">Driv3r034</tspan></text></g>
      </g>

      <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.0s" fill="freeze"/>
        <text x="504" y="344" fill="#94A3B8" font-size="12" letter-spacing="2">SKILLS</text>
        <g font-size="12.5" fill="#0F172A" text-anchor="middle">
          <g><rect x="504" y="354" width="86" height="26" rx="13" fill="url(#pillGrad)" stroke="#2563EB" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="3s" repeatCount="indefinite"/></rect><text x="547" y="371">JavaScript</text></g>
          <g><rect x="598" y="354" width="86" height="26" rx="13" fill="url(#pillGrad)" stroke="#06B6D4" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="3.3s" repeatCount="indefinite"/></rect><text x="641" y="371">TypeScript</text></g>
          <g><rect x="692" y="354" width="60" height="26" rx="13" fill="url(#pillGrad)" stroke="#10B981" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="2.8s" repeatCount="indefinite"/></rect><text x="722" y="371">React</text></g>
          <g><rect x="760" y="354" width="80" height="26" rx="13" fill="url(#pillGrad)" stroke="#2563EB" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="3.1s" repeatCount="indefinite"/></rect><text x="800" y="371">Redux TK</text></g>
          <g><rect x="848" y="354" width="90" height="26" rx="13" fill="url(#pillGrad)" stroke="#06B6D4" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="2.6s" repeatCount="indefinite"/></rect><text x="893" y="371">React Query</text></g>
          <g><rect x="504" y="388" width="70" height="26" rx="13" fill="url(#pillGrad)" stroke="#10B981" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="3.4s" repeatCount="indefinite"/></rect><text x="539" y="405">Next.js</text></g>
          <g><rect x="582" y="388" width="70" height="26" rx="13" fill="url(#pillGrad)" stroke="#2563EB" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="2.9s" repeatCount="indefinite"/></rect><text x="617" y="405">Webpack</text></g>
          <g><rect x="660" y="388" width="60" height="26" rx="13" fill="url(#pillGrad)" stroke="#06B6D4" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="3.2s" repeatCount="indefinite"/></rect><text x="690" y="405">Node.js</text></g>
          <g><rect x="728" y="388" width="40" height="26" rx="13" fill="url(#pillGrad)" stroke="#10B981" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="2.7s" repeatCount="indefinite"/></rect><text x="748" y="405">Git</text></g>
          <g><rect x="776" y="388" width="50" height="26" rx="13" fill="url(#pillGrad)" stroke="#2563EB" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="3.5s" repeatCount="indefinite"/></rect><text x="801" y="405">CSS3</text></g>
        </g>
