      <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.5s" fill="freeze"/>
        <text x="504" y="486" fill="#94A3B8" font-size="12" letter-spacing="2">CONNECT</text>
        <g stroke="#2563EB" stroke-width="1.6" fill="none" filter="url(#softGlow)">
          <animate attributeName="stroke" values="#2563EB;#06B6D4;#10B981;#2563EB" dur="8s" repeatCount="indefinite"/>
          <circle cx="516" cy="512" r="15"/><path d="M510 519c0-3 0-4 1-5-3 0-6-2-6-6 0-1 0-2 1-3 0-1 0-2 0-3 0 0 1 0 3 1 2-1 4-1 6 0 2-1 3-1 3-1 0 1 0 2 0 3 1 1 1 2 1 3 0 4-3 6-6 6 1 1 1 2 1 4v2" stroke-width="1.3"/>
          <circle cx="556" cy="512" r="15"/><path d="M549 513l14-6-3 12-4-3-2 3-1-4z" stroke-width="1.3"/>
        </g>
      </g>
    </g>

    <rect x="1" y="1" width="1178" height="608" rx="26" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.4"/>
    <rect x="1" y="1" width="1178" height="608" rx="26" fill="none" stroke="url(#shimmer)" stroke-width="2" pathLength="1" stroke-dasharray="0.15 0.85">
      <animate attributeName="stroke-dashoffset" values="1;0" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
