          <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.7s" repeatCount="indefinite"/>
        </rect>
        <text x="115" y="392" fill="#10b981" font-size="12" text-anchor="middle" font-weight="bold">Webpack</text>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="8.1s" fill="freeze"/>
      </g>

      <g opacity="0">
        <rect x="160" y="373" width="60" height="28" rx="14" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1">
          <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.1s" repeatCount="indefinite"/>
        </rect>
        <text x="190" y="392" fill="#f59e0b" font-size="12" text-anchor="middle" font-weight="bold">Node.js</text>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="8.4s" fill="freeze"/>
      </g>

      <g opacity="0">
        <rect x="230" y="373" width="40" height="28" rx="14" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1">
          <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="250" y="392" fill="#22d3ee" font-size="12" text-anchor="middle" font-weight="bold">Git</text>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="8.7s" fill="freeze"/>
      </g>

      <g opacity="0">
        <rect x="280" y="373" width="50" height="28" rx="14" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1">
          <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.6s" repeatCount="indefinite"/>
