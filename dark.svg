      <!-- Social Icons -->
      <g opacity="0">
        <text x="0" y="445" fill="#f8fafc" font-size="16" font-weight="bold">Connect</text>
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="9.5s" fill="freeze"/>
      </g>

      <!-- GitHub Icon -->
      <g opacity="0" transform="translate(0, 460)">
        <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <path d="M16 6a10 10 0 0 0-3.16 19.48c.5.09.68-.22.68-.48v-1.7C10.5 23.3 9.5 22 9 21c-.45-.78-.25-1.04-.1-1.2.32-.34 1.28.1 1.64.32a6.6 6.6 0 0 0 4.46.15 6.7 6.7 0 0 1 1.64-2.08c-4.1-.46-6.1-2.1-6.1-5.1a4.6 4.6 0 0 1 1.2-3.2 4.3 4.3 0 0 1 .1-3.1s1-.32 3.3 1.22a11.5 11.5 0 0 1 6 0c2.28-1.54 3.28-1.22 3.28-1.22a4.3 4.3 0 0 1 .1 3.1 4.6 4.6 0 0 1 1.2 3.2c0 3-2 4.64-6.1 5.1a3.8 3.8 0 0 1 1.1 3v4.2c0 .34.18.58.7.48A10 10 0 0 0 16 6z" fill="#f8fafc" transform="scale(0.6) translate(10,10)"/>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="10s" fill="freeze"/>
      </g>

      <!-- LinkedIn Icon -->
      <g opacity="0" transform="translate(45, 460)">
        <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <rect x="10" y="16" width="3" height="9" fill="#f8fafc" transform="scale(0.6) translate(10,10)"/>
        <circle cx="11.5" cy="12.5" r="1.5" fill="#f8fafc" transform="scale(0.6) translate(10,10)"/>
        <path d="M15 16h3v1.5h.04c.4-.75 1.4-1.5 2.9-1.5 3.1 0 3.7 2 3.7 4.6V25h-3v-5.6c0-1.1 0-2.6-1.6-2.6s-1.9 1.2-1.9 2.5V25h-3z" fill="#f8fafc" transform="scale(0.6) translate(10,10)"/>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="10.3s" fill="freeze"/>
      </g>

      <!-- Twitter/X Icon -->
      <g opacity="0" transform="translate(90, 460)">
        <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <path d="M24 9.5c-.8.4-1.6.6-2.5.8.9-.5 1.6-1.4 1.9-2.4-.8.5-1.8.8-2.8 1-.8-.9-2-1.4-3.2-1.4-2.4 0-4.4 2-4.4 4.4 0 .3 0 .7.1 1-3.7-.2-6.9-1.9-9.1-4.6-.4.7-.6 1.4-.6 2.3 0 1.5.8 2.9 2 3.7-.7 0-1.4-.2-2-.5v.1c0 2.1 1.5 3.9 3.5 4.3-.4.1-.8.2-1.2.2-.3 0-.6 0-.9-.1.6 1.8 2.2 3 4.1 3.1-1.5 1.2-3.4 1.9-5.4 1.9-.4 0-.7 0-1.1-.1 2 1.3 4.3 2 6.8 2 8.1 0 12.6-6.7 12.6-12.6v-.6c.9-.6 1.6-1.4 2.2-2.3z" fill="#f8fafc" transform="scale(0.6) translate(10,10)"/>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="10.6s" fill="freeze"/>
